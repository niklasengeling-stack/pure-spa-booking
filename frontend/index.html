<!doctype html>
<html lang="de">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>PureSpa · Buchen</title>
    <style>
      @font-face { font-family: 'Mundial'; src: url('/fonts/MundialThin.otf') format('opentype'); font-weight: 100; font-style: normal; font-display: swap; }
      @font-face { font-family: 'Mundial'; src: url('/fonts/MundialThinItalic.otf') format('opentype'); font-weight: 100; font-style: italic; font-display: swap; }
      @font-face { font-family: 'Mundial'; src: url('/fonts/MundialHair.otf') format('opentype'); font-weight: 200; font-style: normal; font-display: swap; }
      @font-face { font-family: 'Mundial'; src: url('/fonts/MundialHairItalic.otf') format('opentype'); font-weight: 200; font-style: italic; font-display: swap; }
      @font-face { font-family: 'Mundial'; src: url('/fonts/MundialLight.otf') format('opentype'); font-weight: 300; font-style: normal; font-display: swap; }
      @font-face { font-family: 'Mundial'; src: url('/fonts/MundialLightItalic.otf') format('opentype'); font-weight: 300; font-style: italic; font-display: swap; }
      @font-face { font-family: 'Mundial'; src: url('/fonts/MundialRegular.otf') format('opentype'); font-weight: 400; font-style: normal; font-display: swap; }
      @font-face { font-family: 'Mundial'; src: url('/fonts/MundialItalic.otf') format('opentype'); font-weight: 400; font-style: italic; font-display: swap; }
      @font-face { font-family: 'Mundial'; src: url('/fonts/MundialDemibold.otf') format('opentype'); font-weight: 600; font-style: normal; font-display: swap; }
      @font-face { font-family: 'Mundial'; src: url('/fonts/MundialDemiboldItalic.otf') format('opentype'); font-weight: 600; font-style: italic; font-display: swap; }
      @font-face { font-family: 'Mundial'; src: url('/fonts/MundialBold.otf') format('opentype'); font-weight: 700; font-style: normal; font-display: swap; }
      @font-face { font-family: 'Mundial'; src: url('/fonts/MundialBoldItalic.otf') format('opentype'); font-weight: 700; font-style: italic; font-display: swap; }
      @font-face { font-family: 'Mundial'; src: url('/fonts/MundialBlack.otf') format('opentype'); font-weight: 900; font-style: normal; font-display: swap; }
      @font-face { font-family: 'Mundial'; src: url('/fonts/MundialBlackItalic.otf') format('opentype'); font-weight: 900; font-style: italic; font-display: swap; }
    </style>
    <!-- Tailwind CDN – Mundial als einzige Sans-Serif-Schrift -->
    <script>
      window.tailwind = {
        config: {
          theme: {
            extend: {
              fontFamily: {
                sans: ['Mundial', 'ui-sans-serif', 'system-ui', 'sans-serif'],
              },
            },
          },
        },
      };
    </script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
      /* Tailwind CDN-Preflight wird dynamisch nach diesem Style injiziert – !important nötig */
      html { font-family: 'Mundial', ui-sans-serif, system-ui, sans-serif !important; }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
