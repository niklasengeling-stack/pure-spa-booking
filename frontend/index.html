<!doctype html>
<html lang="de">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>PureSpa · Buchen</title>
    <!-- Mundial via Adobe Fonts -->
    <link rel="stylesheet" href="https://use.typekit.net/jzd5bkq.css">
    <!-- Tailwind CDN – mundial als einzige Sans-Serif-Schrift -->
    <script>
      window.tailwind = {
        config: {
          theme: {
            extend: {
              fontFamily: {
                sans: ['mundial', 'sans-serif'],
              },
            },
          },
        },
      };
    </script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
      /* Tailwind CDN-Preflight wird dynamisch injiziert – !important nötig */
      html { font-family: mundial, sans-serif !important; }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
